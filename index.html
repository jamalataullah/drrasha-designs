  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const css = `
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap');

  .cf-phone-prefix { font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 300; padding: 12px 14px; background: var(--warm-bg); border: 1px solid var(--border); border-right: none; color: var(--mid-grey); white-space: nowrap; flex-shrink: 0; letter-spacing: 0.03em; }

  .cf-combo { position: relative; }

  .cf-combo-input-wrap.open svg { transform: translateY(-50%) rotate(180deg); }
  .cf-combo-input { font-family: 'Jost', sans-serif; font-weight: 300; font-size: 13px; width: 100%; padding: 12px 38px 12px 14px; background: var(--white); border: 1px solid var(--border); color: var(--near-black); outline: none; transition: border-color 0.2s; border-radius: 0; letter-spacing: 0.02em; cursor: pointer; }

  .cf-combo-input.selected { border-color: var(--valid); background: rgba(59,109,17,0.03); }

  .cf-combo-dropdown { position: absolute; top: calc(100% + 2px); left: 0; right: 0; z-index: 100; background: var(--white); border: 1px solid var(--border); max-height: 220px; overflow-y: auto; box-shadow: 0 8px 24px rgba(10,10,10,0.1); }

  a.cf-footer-item:hover { color: var(--near-black); }
  .cf-footer-hours-row { display: flex; justify-content: space-between; gap: 12px; }
  .cf-footer-day { font-size: 11px; font-weight: 300; color: var(--near-black); letter-spacing: 0.02em; }

  .cf-image-panel { background: transparent; align-self: stretch; padding: 56px 72px 56px 16px; display: flex; flex-direction: column; }
  .cf-image-placeholder { width: 100%; flex: 1; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; background: linear-gradient(160deg, #E8E0D0 0%, #D0C8B8 100%); overflow: hidden; }

  .cf-side-review { padding: 28px 0 0; }
  .cf-side-review-stars { display: flex; gap: 3px; margin-bottom: 12px; }
  .cf-side-review-star { color: var(--gold); font-size: 11px; }
  .cf-side-review-text { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 300; font-style: italic; line-height: 1.55; color: var(--near-black); margin-bottom: 14px; }
  .cf-side-review-author { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mid-grey); display: flex; align-items: center; gap: 8px; }
  .cf-side-review-author::before { content: ''; display: inline-block; width: 20px; height: 1px; background: var(--gold); }
  .cf-mobile-image { display: none; overflow: hidden; margin-top: 12px; padding-top: 20px; border-top: 1px solid var(--border); }
  .cf-mobile-review { padding-bottom: 20px; }
  .cf-mobile-image .cf-image-placeholder { height: 260px; }
  .announce-bar { background: var(--near-black); color: var(--white); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; display: flex; align-items: center; justify-content: center; height: 36px; overflow: hidden; white-space: nowrap; }

  .announce-sep { opacity: 0.3; }

  .nav { background: var(--cream); border-bottom: 1px solid var(--border); display: flex; align-items: stretch; height: 64px; position: sticky; top: 0; z-index: 200; }
  .nav-left { display: flex; align-items: stretch; }
  .nav-cell { display: flex; align-items: center; padding: 0 28px; border-right: 1px solid var(--border); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; color: var(--near-black); text-decoration: none; white-space: nowrap; background: none; border-top: none; border-bottom: none; border-left: none; font-family: 'Jost', sans-serif; }
  .nav-cell.active { border-bottom: 2px solid var(--gold) !important; }
  .nav-logo { flex: 1; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase; }
  .nav-right { display: flex; align-items: stretch; margin-left: auto; }
  .nav-cell.shop { border-left: 1px solid var(--border); border-right: none; }
  .nav-cell.book { background: var(--near-black); color: var(--white); padding: 0 28px; font-size: 10px; letter-spacing: 0.2em; border: none; }
  .nav-cart { display: flex; align-items: center; padding: 0 18px; border-left: 1px solid var(--border); cursor: pointer; position: relative; }
  .nav-hamburger { display: none; align-items: center; justify-content: center; padding: 0 20px; border-left: 1px solid var(--border); cursor: pointer; background: none; border-top: none; border-right: none; border-bottom: none; flex-direction: column; gap: 5px; }
  .ham-line { width: 22px; height: 1px; background: var(--near-black); transition: transform 0.25s, opacity 0.25s; display: block; }
  .breadcrumb { background: var(--cream); border-bottom: 1px solid var(--border); padding: 12px 80px; display: flex; align-items: center; gap: 8px; }
  .breadcrumb-item { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid-grey); font-weight: 300; cursor: pointer; text-decoration: none; transition: color 0.2s; white-space: nowrap; }
  .breadcrumb-item:hover { color: var(--near-black); }
  .breadcrumb-item.current { color: var(--near-black); cursor: default; }
  @media (max-width: 768px) {
    .hide-mobile { display: none; }
    .announce-bar { height: 32px; font-size: 9px; }
    .nav { height: 56px; }
    .nav-left { display: none; }

    .nav-logo { font-size: 17px; letter-spacing: 0.22em; }
    .nav-hamburger { display: flex; }
    .breadcrumb { padding: 10px 20px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
    .breadcrumb::-webkit-scrollbar { display: none; }

    .cf-image-panel { display: none; }

`;

const TREATMENTS = ["Anti-Wrinkle Injections","Dermal Fillers","Lip Enhancement","Cheek & Jawline Contouring","Skin Boosters / Profhilo","Medical-Grade Facials","Weight Management","Not sure — I'd like advice"];
const HEADINGS = ["What are you interested in?","Tell us about yourself","Anything else to share?"];
const REVIEW_TEXT = '"From the moment I walked in, the experience felt completely different. The consultation was unhurried, thorough, and I left feeling genuinely listened to — not sold to."';

function TreatmentSearch({ value, onChange, onBlur, touched }) {
  const [query, setQuery] = React.useState(value || "");
  const [open, setOpen] = React.useState(false);
  const [focusedIdx, setFocusedIdx] = React.useState(-1);
  const inputRef = React.useRef(null);
  const dropdownRef = React.useRef(null);
  const filtered = query.trim() ? TREATMENTS.filter(t => t.toLowerCase().includes(query.toLowerCase())) : TREATMENTS;
  const isSelected = TREATMENTS.includes(query);
  const isInvalid = touched && !isSelected;
  const select = (t) => { setQuery(t); onChange(t); setOpen(false); setFocusedIdx(-1); };
  const highlight = (text) => {
    if (!query.trim()) return text;
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return text;
    return React.createElement(React.Fragment, null, text.slice(0,idx), React.createElement('mark', null, text.slice(idx,idx+query.length)), text.slice(idx+query.length));
  };
  const handleKeyDown = (e) => {
    if (!open && (e.key==="ArrowDown"||e.key==="Enter")) { setOpen(true); return; }
    if (e.key==="ArrowDown") { e.preventDefault(); setFocusedIdx(i=>Math.min(i+1,filtered.length-1)); }
    else if (e.key==="ArrowUp") { e.preventDefault(); setFocusedIdx(i=>Math.max(i-1,0)); }
    else if (e.key==="Enter"&&focusedIdx>=0) { e.preventDefault(); select(filtered[focusedIdx]); }
    else if (e.key==="Escape") setOpen(false);
  };
  React.useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (!inputRef.current?.closest(".cf-combo")?.contains(e.target)) { setOpen(false); onBlur?.(); } };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [open, onBlur]);
  React.useEffect(() => {
    if (focusedIdx>=0 && dropdownRef.current) dropdownRef.current.children[focusedIdx]?.scrollIntoView({block:"nearest"});
  }, [focusedIdx]);
  return (
    <div className="cf-combo">
      <div className={`cf-combo-input-wrap ${open?"open":""}`}>
        <input ref={inputRef} className={`cf-combo-input ${isSelected?"selected":""} ${isInvalid?"combo-invalid":""}`}
          type="text" placeholder="Search or select a treatment…" value={query} autoComplete="off"
          onFocus={()=>{setOpen(true);setFocusedIdx(-1);}}
          onChange={(e)=>{setQuery(e.target.value);onChange("");setOpen(true);setFocusedIdx(-1);}}
          onKeyDown={handleKeyDown} onBlur={()=>setTimeout(()=>onBlur?.(),150)}
          aria-autocomplete="list" aria-expanded={open} role="combobox"
        />
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      {open && (
        <div className="cf-combo-dropdown" ref={dropdownRef} role="listbox">
          {filtered.length>0 ? filtered.map((t,i)=>(
            <div key={t} className={`cf-combo-option ${t===value?"active":""} ${i===focusedIdx?"focused":""}`}
              onMouseDown={()=>select(t)} role="option" aria-selected={t===value}>{highlight(t)}</div>
          )) : <div className="cf-combo-empty">No treatments found — try a different search</div>}
        </div>
      )}
    </div>
  );
}

function useField(initial, validate) {
  const [value, setValue] = React.useState(initial || "");
  const [touched, setTouched] = React.useState(false);
  const error = touched && validate ? validate(value) : null;
  return { value, error, onChange:(e)=>setValue(e.target.value), onBlur:()=>setTouched(true), markTouched:()=>setTouched(true), inputClass: touched?(error?"cf-input invalid":"cf-input valid"):"cf-input" };
}

const validators = {
  name: (v) => !v.trim()||v.trim().length<2 ? "Please enter a valid name" : null,
  email: (v) => !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) ? "Please enter a valid email address" : null,
  phone: (v) => { const d=v.replace(/\D/g,""); return d.length<9||d.length>11?"Please enter a valid UK number":null; },
  treatment: (v) => !v ? "Please select a treatment to continue" : null,
};

const Tick = () => <span className="cf-tick"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></span>;

const MobileImageBlock = () => (
  <div className="cf-mobile-image">
    <div className="cf-mobile-review">
      <div className="cf-side-review-stars">{[1,2,3,4,5].map(i=><span key={i} className="cf-side-review-star">★</span>)}</div>
      <p className="cf-side-review-text">{REVIEW_TEXT}</p>
      <span className="cf-side-review-author">Claire H. · Verified patient</span>
    </div>
    <div className="cf-image-placeholder" style={{height:260}}>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--mid-grey)" strokeWidth="1"><rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      <span>Clinic image</span>
    </div>
  </div>
);

function ContactForm() {
  const [step, setStep] = React.useState(1);
  const [submitted, setSubmitted] = React.useState(false);
  const [msgLen, setMsgLen] = React.useState(0);
  const [menuOpen, setMenuOpen] = React.useState(false);
  const [formHeight, setFormHeight] = React.useState(null);
  const rightColRef = React.useRef(null);
  const reviewRef = React.useRef(null);
  const footerRef = React.useRef(null);

  const [treatmentVal, setTreatmentVal] = React.useState("");
  const [treatmentTouched, setTreatmentTouched] = React.useState(false);
  const treatment = {
    value: treatmentVal,
    error: treatmentTouched ? validators.treatment(treatmentVal) : null,
    onChange: (v) => setTreatmentVal(v),
    onBlur: () => setTreatmentTouched(true),
    markTouched: () => setTreatmentTouched(true),
  };

  const fname = useField("", validators.name);
  const lname = useField("", validators.name);
  const phone = useField("", validators.phone);
  const email = useField("", validators.email);
  const [msg, setMsg] = React.useState("");

  const goNext = (to) => {
    if (to===2) { treatment.markTouched(); if (validators.treatment(treatment.value)) return; }
    if (to===3) { [fname,lname,phone,email].forEach(f=>f.markTouched()); if ([fname,lname,phone,email].some(f=>f.error||!f.value)) return; }
    setStep(to);
  };

  React.useEffect(() => {
    const measure = () => { if (rightColRef.current) setFormHeight(rightColRef.current.offsetHeight); };
    setTimeout(measure, 50);
  }, [step, submitted]);

  return (
    <div className="cf-root">
      <style>{css}</style>
      <div className="announce-bar">
        <span className="announce-item">London's Finest Aesthetics &amp; Wellness Clinic</span>
        <span className="hide-mobile">
          <span className="announce-sep">&nbsp;·&nbsp;</span>
          <span className="announce-item">Safety in Beauty Diamond Award 2025</span>
          <span className="announce-sep">&nbsp;·&nbsp;</span>
          <span className="announce-item">WhatsApp Us</span>
        </span>
      </div>
      <nav className="nav">
        <div className="nav-left">
          <a className="nav-cell">Treatments</a>
          <a className="nav-cell">The Clinic</a>
        </div>
        <div className="nav-logo">D R &nbsp; R A S H A</div>
        <div className="nav-right">
          <a className="nav-cell shop">Shop</a>
          <button className="nav-cell book" style={{borderBottom:'3px solid var(--white)'}}>Book Consultation</button>
          <div className="nav-cart">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
              <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
          </div>
          <button className="nav-hamburger" onClick={()=>setMenuOpen(!menuOpen)}>
            <span className="ham-line" style={menuOpen?{transform:"translateY(6px) rotate(45deg)"}:{}}/>
            <span className="ham-line" style={menuOpen?{opacity:0}:{}}/>
            <span className="ham-line" style={menuOpen?{transform:"translateY(-6px) rotate(-45deg)"}:{}}/>
          </button>
        </div>
      </nav>
      <nav className="breadcrumb" aria-label="Breadcrumb">
        {[{label:"Home",href:"#"},{label:"The Clinic",href:"#"},{label:"Contact Us",href:null}].map((crumb,i,arr)=>(
          <span key={crumb.label} style={{display:"flex",alignItems:"center",gap:8}}>
            {crumb.href ? <a className="breadcrumb-item" href={crumb.href}>{crumb.label}</a> : <span className="breadcrumb-item current">{crumb.label}</span>}
            {i < arr.length-1 && <svg width="6" height="10" viewBox="0 0 6 10" fill="none" style={{flexShrink:0,opacity:0.3}}><path d="M1 1l4 4-4 4" stroke="var(--near-black)" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </span>
        ))}
      </nav>
      <div className="cf-page">
        <div className="cf-right" ref={rightColRef}>
          <div className="cf-form-wrap">
            <div className="cf-intro">
              <h1 className="cf-intro-title">Begin your consultation journey</h1>
              <p className="cf-intro-body">We're pleased you're considering Dr Rasha for your care. Simply tell us what you're interested in and a member of our team will be in touch within 24 hours to arrange your complimentary consultation.</p>
              <div className="cf-google-proof">
                <svg className="cf-google-g" viewBox="0 0 24 24">
                  <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                  <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                  <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                  <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <div className="cf-google-stars">{[1,2,3,4,5].map(i=><svg key={i} viewBox="0 0 24 24" className="cf-star-svg"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="#B8965A" stroke="none"/></svg>)}</div>
                <span className="cf-google-score">4.6</span>
                <span className="cf-google-divider"/>
                <span className="cf-google-count">314 Google reviews</span>
              </div>
            </div>
            {!submitted ? (
              <>
                <div className="cf-progress">{[1,2,3].map(i=><div key={i} className={`cf-prog-bar ${i<=step?"done":""}`}/>)}</div>
                <span className="cf-step-label">Step {step} of 3</span>
                <h2 className="cf-form-heading">{HEADINGS[step-1]}</h2>
                {step===1 && (
                  <div className="cf-fields">
                    <div className="cf-field">
                      <label className="cf-label">Treatment you're interested in <span className="cf-req">*</span></label>
                      <TreatmentSearch value={treatment.value} onChange={treatment.onChange} onBlur={treatment.onBlur} touched={treatmentTouched}/>
                      {treatment.error && <span className="cf-err show">{treatment.error}</span>}
                    </div>
                    <div className="cf-btn-row"><button className="cf-btn cf-btn-primary" onClick={()=>goNext(2)}>Continue</button></div>
                    <MobileImageBlock/>
                  </div>
                )}
                {step===2 && (
                  <div className="cf-fields">
                    <div className="cf-field-row">
                      <div className="cf-field">
                        <label className="cf-label">First name <span className="cf-req">*</span></label>
                        <div className="cf-input-wrap"><input className={fname.inputClass} type="text" placeholder="" autoComplete="given-name" value={fname.value} onChange={fname.onChange} onBlur={fname.onBlur}/><Tick/></div>
                        {fname.error && <span className="cf-err show">{fname.error}</span>}
                      </div>
                      <div className="cf-field">
                        <label className="cf-label">Last name <span className="cf-req">*</span></label>
                        <div className="cf-input-wrap"><input className={lname.inputClass} type="text" placeholder="" autoComplete="family-name" value={lname.value} onChange={lname.onChange} onBlur={lname.onBlur}/><Tick/></div>
                        {lname.error && <span className="cf-err show">{lname.error}</span>}
                      </div>
                    </div>
                    <div className="cf-field">
                      <label className="cf-label">Phone number <span className="cf-req">*</span></label>
                      <div className="cf-phone-row cf-input-wrap">
                        <span className="cf-phone-prefix">🇬🇧 +44</span>
                        <input className={phone.inputClass} type="tel" placeholder="" autoComplete="tel-national" value={phone.value} onChange={phone.onChange} onBlur={phone.onBlur}/>
                        <Tick/>
                      </div>
                      <span className="cf-hint">Enter your number without the leading 0</span>
                      {phone.error && <span className="cf-err show">{phone.error}</span>}
                    </div>
                    <div className="cf-field">
                      <label className="cf-label">Email address <span className="cf-req">*</span></label>
                      <div className="cf-input-wrap"><input className={email.inputClass} type="email" placeholder="" autoComplete="email" value={email.value} onChange={email.onChange} onBlur={email.onBlur}/><Tick/></div>
                      {email.error && <span className="cf-err show">{email.error}</span>}
                    </div>
                    <div className="cf-btn-row">
                      <button className="cf-btn cf-btn-back" onClick={()=>setStep(1)}>Back</button>
                      <button className="cf-btn cf-btn-primary" onClick={()=>goNext(3)}>Continue</button>
                    </div>
                    <MobileImageBlock/>
                  </div>
                )}
                {step===3 && (
                  <div className="cf-fields">
                    <div className="cf-field">
                      <label className="cf-label">Your message <span className="cf-label-opt">(optional)</span></label>
                      <textarea className="cf-textarea" placeholder="Tell us a little about what you're looking for…" maxLength={500} value={msg} onChange={(e)=>{setMsg(e.target.value);setMsgLen(e.target.value.length);}}/>
                      <span className="cf-char-hint">{msgLen} / 500</span>
                    </div>
                    <div className="cf-btn-row">
                      <button className="cf-btn cf-btn-back" onClick={()=>setStep(2)}>Back</button>
                      <button className="cf-btn cf-btn-primary" onClick={()=>setSubmitted(true)}>Send my enquiry</button>
                    </div>
                    <MobileImageBlock/>
                  </div>
                )}
              </>
            ) : (
              <div className="cf-success">
                <div className="cf-success-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
                <h2 className="cf-success-title">Enquiry received</h2>
                <p className="cf-success-body">Thank you — a member of the Dr Rasha team will be in touch within 24 hours to arrange your complimentary consultation.</p>
                <span className="cf-success-time">A confirmation has been sent to {email.value}</span>
                <div className="cf-badges">
                  <span className="cf-badge">Check your inbox</span>
                  <span className="cf-badge">Harley Street · London</span>
                </div>
              </div>
            )}
          </div>
          <div className="cf-footer-info" ref={footerRef}>
            <div className="cf-footer-col">
              <span className="cf-footer-heading">Contact</span>
              <a className="cf-footer-item" href="tel:02033374410">TEL: 0203 337 4410</a>
              <a className="cf-footer-item" href="https://wa.me/447780851111">WHATSAPP: 07780 851111</a>
              <a className="cf-footer-item" href="mailto:info@drrashaclinic.com">EMAIL: info@drrashaclinic.com</a>
            </div>
            <div className="cf-footer-col">
              <span className="cf-footer-heading">Location</span>
              {["161 Brompton Road","Knightsbridge","London","SW3 1EX"].map(l=><span key={l} className="cf-footer-item">{l}</span>)}
            </div>
            <div className="cf-footer-col">
              <span className="cf-footer-heading">Hours</span>
              {[["Monday","9am – 7pm"],["Tuesday","9am – 8pm"],["Wednesday","9am – 7pm"],["Thursday","9am – 8pm"],["Friday","9am – 7pm"],["Saturday","9am – 7pm"],["Sunday","Closed"]].map(([d,h])=>(
                <div key={d} className="cf-footer-hours-row">
                  <span className="cf-footer-day">{d}</span>
                  <span className={`cf-footer-hours ${h==="Closed"?"closed":""}`}>{h}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div className="cf-image-panel">
          <div className="cf-image-placeholder">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--mid-grey)" strokeWidth="1">
              <rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
            </svg>
            <span>Image</span>
          </div>
          <div className="cf-side-review" ref={reviewRef}>
            <div className="cf-side-review-stars">{[1,2,3,4,5].map(i=><span key={i} className="cf-side-review-star">★</span>)}</div>
            <p className="cf-side-review-text">{REVIEW_TEXT}</p>
            <span className="cf-side-review-author">Claire H. · Verified patient</span>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ContactForm));
  </script>
</body>
</html>
